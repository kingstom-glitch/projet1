name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  check-html:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Vérifier fichier HTML
      run: |
        if [ -f index.html ]; then
          echo "Fichier présent ✅"
        else
          echo "Fichier manquant ❌"
          exit 1
        fi